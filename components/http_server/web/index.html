<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB LED Controller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #dde;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1a1a2e;
            border-radius: 18px;
            padding: 26px;
            width: 100%;
            max-width: 420px;
            height: fit-content;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 1.3rem;
            color: #8ab4f8;
            margin-bottom: 22px;
            letter-spacing: 0.03em;
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #667;
            margin-bottom: 8px;
        }

        /* ── Power toggle ──────────────────────────────────── */

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle {
            position: relative;
            width: 54px;
            height: 27px;
            cursor: pointer;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .track {
            position: absolute;
            inset: 0;
            background: #2a2a3e;
            border-radius: 27px;
            transition: background 0.2s;
        }

        .track::before {
            content: '';
            position: absolute;
            width: 21px;
            height: 21px;
            left: 3px;
            top: 3px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle input:checked + .track {
            background: #1e6b3e;
        }

        .toggle input:checked + .track::before {
            transform: translateX(27px);
            background: #4ade80;
        }

        /* ── Color preview ─────────────────────────────────── */

        #preview {
            width: 100%;
            height: 72px;
            border-radius: 12px;
            background: #ff0000;
            transition: background 0.1s;
            border: 2px solid rgba(255, 255, 255, 0.06);
        }

        /* ── Color picker ──────────────────────────────────── */

        input[type="color"] {
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            padding: 3px;
            background: #0f3460;
        }

        /* ── Range sliders ─────────────────────────────────── */

        .srow {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .srow:last-child {
            margin-bottom: 0;
        }

        .ch {
            width: 14px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .ch.r { color: #f87171; }
        .ch.g { color: #4ade80; }
        .ch.b { color: #60a5fa; }

        input[type="range"] {
            flex: 1;
            height: 5px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            appearance: none;
            background: #2a2a3e;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        #sR   { accent-color: #f87171; }
        #sG   { accent-color: #4ade80; }
        #sB   { accent-color: #60a5fa; }
        #sBri { accent-color: #8ab4f8; }

        .val {
            width: 30px;
            text-align: right;
            font-size: 0.8rem;
            color: #778;
        }

        /* ── Timer ─────────────────────────────────────────── */

        .trow {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        input[type="number"] {
            flex: 1;
            background: #0f1f40;
            border: 1px solid #2a3a5e;
            color: #dde;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 0.95rem;
        }

        input[type="number"]:focus {
            outline: 1px solid #8ab4f8;
        }

        button {
            background: #0f1f40;
            border: 1px solid rgba(138, 180, 248, 0.27);
            color: #8ab4f8;
            border-radius: 8px;
            padding: 9px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }

        button:hover {
            background: #1a3060;
        }

        button.stop {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.27);
        }

        button.stop:hover {
            background: #3a1020;
        }

        #tStatus {
            font-size: 0.82rem;
            color: #f0a500;
            margin-top: 7px;
            min-height: 18px;
        }

        /* ── Connection status ─────────────────────────────── */

        #status {
            text-align: center;
            font-size: 0.72rem;
            color: #445;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>RGB LED Controller</h1>

        <!-- Power -->
        <div class="section">
            <div class="row">
                <span class="label" style="margin: 0">Power</span>
                <label class="toggle">
                    <input type="checkbox" id="power">
                    <span class="track"></span>
                </label>
            </div>
        </div>

        <!-- Color preview -->
        <div class="section">
            <div class="label">Preview</div>
            <div id="preview"></div>
        </div>

        <!-- Color picker -->
        <div class="section">
            <div class="label">Color Picker</div>
            <input type="color" id="picker" value="#ff0000">
        </div>

        <!-- RGB sliders -->
        <div class="section">
            <div class="label">RGB Channels</div>
            <div class="srow">
                <span class="ch r">R</span>
                <input type="range" id="sR" min="0" max="255" value="255">
                <span class="val" id="vR">255</span>
            </div>
            <div class="srow">
                <span class="ch g">G</span>
                <input type="range" id="sG" min="0" max="255" value="0">
                <span class="val" id="vG">0</span>
            </div>
            <div class="srow">
                <span class="ch b">B</span>
                <input type="range" id="sB" min="0" max="255" value="0">
                <span class="val" id="vB">0</span>
            </div>
        </div>

        <!-- Brightness -->
        <div class="section">
            <div class="label">Brightness</div>
            <div class="srow">
                <span style="font-size: 1rem; width: 14px">&#9788;</span>
                <input type="range" id="sBri" min="0" max="100" value="100">
                <span class="val" id="vBri">100%</span>
            </div>
        </div>

        <!-- Timer -->
        <div class="section">
            <div class="label">Timer — turn on for N seconds</div>
            <div class="trow">
                <input type="number" id="tSec" min="1" max="3600" value="10" placeholder="s">
                <button onclick="startTimer()">Start</button>
                <button class="stop" onclick="stopTimer()">Stop</button>
            </div>
            <div id="tStatus"></div>
        </div>

        <div id="status">Connecting…</div>
    </div>

    <script>
        // Shorthand for getElementById
        const $ = (id) => document.getElementById(id);

        // Timestamp of last user interaction — prevents poll from overwriting
        // slider values while the user is actively dragging.
        let lastInteraction = 0;

        // ── API helpers ─────────────────────────────────────────────────────

        function post(url, body) {
            return fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            }).catch(() => null);
        }

        let debounceTimer;
        function debounce(fn, ms = 130) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fn, ms);
        }

        // ── Color helpers ────────────────────────────────────────────────────

        function toHex(r, g, b) {
            return '#' + [r, g, b].map((v) => v.toString(16).padStart(2, '0')).join('');
        }

        function fromHex(hex) {
            return {
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16),
            };
        }

        // ── UI sync ──────────────────────────────────────────────────────────

        function syncPreview() {
            const r = +$('sR').value;
            const g = +$('sG').value;
            const b = +$('sB').value;

            $('preview').style.background = toHex(r, g, b);
            $('picker').value = toHex(r, g, b);
            $('vR').textContent = r;
            $('vG').textContent = g;
            $('vB').textContent = b;
        }

        function sendColor() {
            const r = +$('sR').value;
            const g = +$('sG').value;
            const b = +$('sB').value;
            syncPreview();
            lastInteraction = Date.now();
            debounce(() => post('/color', { r, g, b }));
        }

        // ── Event bindings ───────────────────────────────────────────────────

        $('power').addEventListener('change', () => {
            post('/power', { on: $('power').checked });
        });

        $('picker').addEventListener('input', () => {
            const { r, g, b } = fromHex($('picker').value);
            $('sR').value = r;
            $('sG').value = g;
            $('sB').value = b;
            lastInteraction = Date.now();
            syncPreview();
            debounce(() => post('/color', { r, g, b }));
        });

        $('sR').addEventListener('input', sendColor);
        $('sG').addEventListener('input', sendColor);
        $('sB').addEventListener('input', sendColor);

        $('sBri').addEventListener('input', () => {
            $('vBri').textContent = $('sBri').value + '%';
            lastInteraction = Date.now();
            debounce(() => post('/brightness', { value: +$('sBri').value }));
        });

        // ── Timer controls ───────────────────────────────────────────────────

        function startTimer() {
            const seconds = +$('tSec').value || 10;
            post('/timer', { seconds });
        }

        function stopTimer() {
            post('/timer', { seconds: 0 });
            $('tStatus').textContent = '';
        }

        // ── State polling ────────────────────────────────────────────────────

        async function pollState() {
            let state;

            try {
                const response = await fetch('/state');
                state = await response.json();
            } catch {
                $('status').textContent = 'Connection lost…';
                return;
            }

            // Skip slider update if user recently touched them
            const userIsInteracting = Date.now() - lastInteraction < 1500;

            if (!userIsInteracting) {
                $('sR').value  = state.r;
                $('sG').value  = state.g;
                $('sB').value  = state.b;
                $('sBri').value = state.brightness;
                $('vR').textContent   = state.r;
                $('vG').textContent   = state.g;
                $('vB').textContent   = state.b;
                $('vBri').textContent = state.brightness + '%';
                $('preview').style.background = toHex(state.r, state.g, state.b);
                $('picker').value = toHex(state.r, state.g, state.b);
            }

            $('power').checked = state.on;

            $('tStatus').textContent = state.timer_remaining > 0
                ? `⏱ Turns off in ${state.timer_remaining}s`
                : '';

            $('status').textContent = 'ESP32 RGB Controller — connected';
        }

        pollState();
        setInterval(pollState, 2000);
    </script>
</body>
</html>
